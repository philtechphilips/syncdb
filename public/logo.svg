    />

    <!-- The Core Sync Node -->
    <rect
        x="47" y="32" width="6" height="36"
        rx="3"
        fill="#277955"
    />
    
    <!-- Dynamic Pulse Detail -->
    <circle
        cx="50"
        cy="50"
        r="3"
        fill="#277955"
    />
</svg>
